kind: ConfigMap
metadata:
  name: grafana-dashboard-config
  namespace: flow-visibility
---
apiVersion: v1
data:
  dashboard_provider.yaml: |-
    apiVersion: 1
    providers:
      - name: grafana-dashboards
        folder: ''
        type: file
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: flow-visibility
---
apiVersion: v1
data:
  datasource_provider.yaml: |-
    apiVersion: 1
    datasources:
      - name: ClickHouse
        type: grafana-clickhouse-datasource
        access: proxy
        url: http://clickhouse-clickhouse.flow-visibility.svc:8123
        editable: true
        jsonData:
          server: clickhouse-clickhouse.flow-visibility.svc
          port: 9000
          username: $CLICKHOUSE_USERNAME
        secureJsonData:
          password: $CLICKHOUSE_PASSWORD
kind: ConfigMap
metadata:
  name: grafana-datasource-provider
  namespace: flow-visibility
---
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse-secret
  namespace: flow-visibility
stringData:
  password: clickhouse_operator_password
  username: clickhouse_operator
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: flow-visibility
stringData:
  admin-password: admin
  admin-username: admin
type: Opaque
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: flow-visibility
spec:
  ports:
  - port: 3000
    protocol: TCP
    targetPort: http-grafana
  selector:
    app: grafana
  sessionAffinity: None
  type: NodePort
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: grafana-pv
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 2Gi
  hostPath:
    path: /data/grafana
  storageClassName: grafana-storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: flow-visibility
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: grafana-storage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: grafana
  name: grafana
  namespace: flow-visibility
spec:
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - env:
        - name: GF_INSTALL_PLUGINS
          value: https://downloads.antrea.io/artifacts/grafana-custom-plugins/theia-grafana-sankey-plugin-1.0.1.zip;theia-grafana-sankey-plugin,https://downloads.antrea.io/artifacts/grafana-custom-plugins/theia-grafana-chord-plugin-1.0.0.zip;theia-grafana-chord-plugin,grafana-clickhouse-datasource
            1.0.1
        - name: CLICKHOUSE_USERNAME
          valueFrom:
            secretKeyRef:
              key: username
              name: clickhouse-secret
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: clickhouse-secret
        - name: GF_AUTH_BASIC_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "false"
        - name: GF_SECURITY_ADMIN_USER
          valueFrom:
            secretKeyRef:
              key: admin-username
              name: grafana-secret
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              key: admin-password
              name: grafana-secret
        image: projects.registry.vmware.com/antrea/theia-grafana:8.3.3
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 3000
          timeoutSeconds: 1
        name: grafana
        ports:
        - containerPort: 3000
          name: http-grafana
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /robots.txt
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 2
        resources:
          requests:
            cpu: 250m
            memory: 750Mi
        volumeMounts:
        - mountPath: /data
          name: grafana-pv
        - mountPath: /etc/grafana/provisioning/datasources
          name: grafana-datasource-provider
        - mountPath: /etc/grafana/provisioning/dashboards
          name: grafana-dashboard-provider
        - mountPath: /var/lib/grafana/dashboards
          name: grafana-dashboard-config
      securityContext:
        fsGroup: 472
        supplementalGroups:
        - 0
      serviceAccountName: grafana
      volumes:
      - name: grafana-pv
        persistentVolumeClaim:
          claimName: grafana-pvc
      - configMap:
          name: grafana-datasource-provider
        name: grafana-datasource-provider
      - configMap:
          name: grafana-dashboard-provider
        name: grafana-dashboard-provider
      - configMap:
          name: grafana-dashboard-config
        name: grafana-dashboard-config
---
apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  labels:
    app: clickhouse
  name: clickhouse
  namespace: flow-visibility
spec:
  configuration:
    clusters:
    - layout:
        replicasCount: 1
        shardsCount: 1
      name: clickhouse
    users:
      clickhouse_operator/k8s_secret_password: flow-visibility/clickhouse-secret/password
      clickhouse_operator/networks/ip: ::/0
  defaults:
    templates:
      podTemplate: pod-template
      serviceTemplate: service-template
  templates:
    podTemplates:
    - name: pod-template
      spec:
        containers:
        - image: projects.registry.vmware.com/antrea/theia-clickhouse-server:21.11
          imagePullPolicy: IfNotPresent
          name: clickhouse
          volumeMounts:
          - mountPath: /docker-entrypoint-initdb.d
            name: clickhouse-configmap-volume
          - mountPath: /var/lib/clickhouse
            name: clickhouse-storage-volume
        - env:
          - name: CLICKHOUSE_USERNAME
            valueFrom:
              secretKeyRef:
                key: username
                name: clickhouse-secret
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                key: password
                name: clickhouse-secret
          - name: DB_URL
            value: tcp://localhost:9000
          - name: TABLE_NAME
            value: default.flows
          - name: MV_NAMES
            value: default.flows_pod_view default.flows_node_view default.flows_policy_view
          - name: STORAGE_SIZE
            value: 8Gi
          - name: THRESHOLD
            value: "0.5"
          - name: DELETE_PERCENTAGE
            value: "0.5"
          - name: EXEC_INTERVAL
            value: 1m
          - name: SKIP_ROUNDS_NUM
            value: "3"
          image: projects.registry.vmware.com/antrea/theia-clickhouse-monitor:latest
          imagePullPolicy: IfNotPresent
          name: clickhouse-monitor
        volumes:
        - configMap:
            name: clickhouse-mounted-configmap
          name: clickhouse-configmap-volume
        - emptyDir:
            medium: Memory
            sizeLimit: 8Gi
          name: clickhouse-storage-volume
    serviceTemplates:
    - name: service-template
      spec:
        ports:
        - name: http
          port: 8123
        - name: tcp
          port: 9000
        type: ClusterIP
